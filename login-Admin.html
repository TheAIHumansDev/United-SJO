<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Airlines · Operations Portal Login</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ua-blue:   #0050A0;
  --ua-blue-2: #0066CC;
  --ua-blue-3: #1A7FD4;
  --ua-sky:    #4DAAFF;
  --ua-light:  #85CAFF;
  --ua-gold:   #F4C842;
  --ua-dark:   #030C1A;
  --ua-text:   #D4E6F8;
  --ua-muted:  #4E7090;
}

body {
  font-family:'Inter',sans-serif;
  background:var(--ua-dark);
  overflow:hidden;
}

#canvas-container { position:fixed; inset:0; z-index:1; }

.login-container {
  position:relative; z-index:2;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh; padding:20px;
}

.login-box {
  background:rgba(6,15,34,0.88);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(0,80,160,0.32);
  border-radius:24px;
  padding:48px 40px;
  width:100%; max-width:430px;
  box-shadow:0 25px 60px -12px rgba(0,0,0,0.7), 0 0 90px rgba(0,80,160,0.12);
  animation:slideIn .6s ease-out;
  position:relative; overflow:hidden;
}
.login-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--ua-blue), var(--ua-sky), var(--ua-gold));
}

@keyframes slideIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

.logo { text-align:center; margin-bottom:36px; }

.ua-globe {
  width:64px; height:64px; margin:0 auto 16px;
  background:linear-gradient(135deg, var(--ua-blue), var(--ua-blue-3));
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  box-shadow:0 0 30px rgba(0,80,160,0.55), inset 0 1px 0 rgba(255,255,255,0.14);
  border:1px solid rgba(77,170,255,0.35);
  animation:float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.logo h1 {
  font-size:24px; font-weight:900; letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 0%, var(--ua-sky) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}

.logo p {
  color:var(--ua-muted); font-size:11px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:3px; text-transform:uppercase;
}

.handler-tag {
  margin-top:10px; display:inline-block;
  padding:4px 14px; border-radius:20px;
  background:rgba(0,80,160,0.14); border:1px solid rgba(0,80,160,0.3);
  font-size:9px; font-weight:700; color:var(--ua-sky);
  font-family:'JetBrains Mono',monospace; letter-spacing:1.5px;
}

.input-group { margin-bottom:20px; }

.input-group label {
  display:block; color:#A8C4E0;
  font-size:12px; margin-bottom:8px;
  font-weight:600; letter-spacing:0.5px;
  text-transform:uppercase; font-family:'JetBrains Mono',monospace;
}

.input-group input {
  width:100%; padding:14px 18px;
  background:rgba(10,24,48,0.65);
  border:1px solid rgba(0,80,160,0.28);
  border-radius:12px; color:#fff;
  font-size:15px; outline:none;
  transition:all 0.25s ease;
  font-family:'Inter',sans-serif;
}
.input-group input:focus {
  border-color:var(--ua-sky);
  background:rgba(10,24,48,0.9);
  box-shadow:0 0 0 3px rgba(77,170,255,0.12);
}
.input-group input::placeholder { color:#3A5A78; }

.login-btn {
  width:100%; padding:16px;
  background:linear-gradient(135deg, var(--ua-blue) 0%, var(--ua-blue-3) 100%);
  border:none; border-radius:12px;
  color:#fff; font-size:15px; font-weight:800;
  letter-spacing:0.3px;
  cursor:pointer; transition:all 0.3s ease;
  margin-top:8px; overflow:hidden; position:relative;
  font-family:'Inter',sans-serif;
  box-shadow:0 4px 18px rgba(0,80,160,0.4);
}
.login-btn:hover:not(:disabled) {
  transform:translateY(-2px);
  box-shadow:0 12px 32px rgba(0,80,160,0.55);
}
.login-btn:disabled { opacity:0.6; cursor:not-allowed; }
.login-btn::before {
  content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  transition:left 0.5s;
}
.login-btn:hover::before { left:100%; }

.message {
  margin-top:16px; padding:12px 16px;
  border-radius:10px; font-size:13px;
  text-align:center; display:none;
  font-family:'JetBrains Mono',monospace;
  line-height:1.5;
}
.message.error   { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#FCA5A5; }
.message.success { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); color:#6EE7B7; }
.message.denied   { background:rgba(244,200,66,0.1); border:1px solid rgba(244,200,66,0.35); color:#F4C842; }

.loading-spinner {
  display:inline-block; width:15px; height:15px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-right:8px; vertical-align:middle;
}
@keyframes spin { to{transform:rotate(360deg)} }

.footer {
  margin-top:28px; text-align:center;
  color:#2B4258; font-size:11px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.5px;
}

/* Welcome overlay */
#welcome-screen {
  position:fixed; inset:0;
  background:rgba(3,12,26,0.97);
  backdrop-filter:blur(14px);
  z-index:1000; display:none;
  justify-content:center; align-items:center;
  flex-direction:column;
}
#welcome-screen.show { display:flex; animation:fadeIn .5s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.welcome-icon {
  width:84px; height:84px; border-radius:50%;
  background:linear-gradient(135deg, var(--ua-blue), var(--ua-blue-3));
  display:flex; align-items:center; justify-content:center;
  font-size:38px; margin-bottom:22px;
  box-shadow:0 0 40px rgba(0,80,160,0.5);
  animation:bounce 0.8s ease;
}
@keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-16px)} }

.welcome-content { text-align:center; }
.welcome-content h2 {
  font-size:36px; font-weight:900; margin-bottom:8px; letter-spacing:-1px;
  background:linear-gradient(135deg,#fff, var(--ua-sky));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.welcome-content p { color:#A8C4E0; font-size:17px; margin-bottom:14px; }
.role-badge {
  display:inline-block; padding:7px 20px;
  background:linear-gradient(135deg, var(--ua-blue), var(--ua-blue-3));
  border-radius:20px; font-weight:800; color:#fff; font-size:13px;
  letter-spacing:0.5px;
  box-shadow:0 4px 16px rgba(0,80,160,0.4);
}
.redirect-msg {
  margin-top:22px; color:var(--ua-muted);
  font-size:12px; font-family:'JetBrains Mono',monospace; letter-spacing:0.5px;
}
</style>
</head>
<body>
<div id="canvas-container"></div>

<div class="login-container">
  <div class="login-box">
    <div class="logo">
      <div class="ua-globe">🌐</div>
      <h1>United Airlines</h1>
      <p>Operations Portal</p>
      <div class="handler-tag">AS GROUND HANDLING</div>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Ingrese su usuario" required autocomplete="username">
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <span id="btnText">Iniciar Sesión</span>
      </button>
      <div class="message" id="message"></div>
    </form>

    <div class="footer">🔒 Acceso exclusivo · Personal autorizado United Airlines</div>
  </div>
</div>

<div id="welcome-screen">
  <div class="welcome-icon">✈️</div>
  <div class="welcome-content">
    <h2>¡Bienvenido!</h2>
    <p id="welcomeUser"></p>
    <span class="role-badge" id="welcomeRole">UNITED</span>
    <p class="redirect-msg">Cargando portal de operaciones…</p>
  </div>
</div>

<script>
// ── Three.js background (United blue theme) ──
const cntr = document.getElementById('canvas-container');
const sc = new THREE.Scene();
const cm = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const rd = new THREE.WebGLRenderer({ alpha:true, antialias:true });
rd.setSize(window.innerWidth, window.innerHeight);
cntr.appendChild(rd.domElement);

const geo = new THREE.BufferGeometry();
const N = 2400, pos = new Float32Array(N*3);
for (let i=0;i<N*3;i++) pos[i] = (Math.random()-0.5)*100;
geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
const mat = new THREE.PointsMaterial({ size:0.065, color:0x4DAAFF, transparent:true, opacity:0.65, blending:THREE.AdditiveBlending });
const pts = new THREE.Points(geo, mat);
sc.add(pts); cm.position.z = 30;

const tg = new THREE.TorusGeometry(10, 0.4, 16, 100);
const tm = new THREE.MeshBasicMaterial({ color:0x0066CC, wireframe:true, transparent:true, opacity:0.14 });
const tr = new THREE.Mesh(tg, tm); tr.position.set(-15,0,-20); sc.add(tr);

(function a(){ requestAnimationFrame(a); pts.rotation.y += 0.001; tr.rotation.x += 0.008; rd.render(sc,cm); })();
window.addEventListener('resize', () => {
  cm.aspect = window.innerWidth/window.innerHeight; cm.updateProjectionMatrix();
  rd.setSize(window.innerWidth, window.innerHeight);
});

// ── Login logic ──
// IMPORTANTE: usa el mismo GAS backend que el resto del sistema de Aero Despachos.
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwratJLa8uJ_EYMIOPbzkh4YlrahSPUdEonIeFHtsA5fAzlxMyRFyuOeHd6sxughzXL/exec';

function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) { showMsg('Complete todos los campos', 'error'); return; }

  setLoading(true);
  showMsg('', '');

  const cb = 'lCb' + Date.now();
  const url = `${SCRIPT_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&callback=${cb}`;

  window[cb] = function(res) {
    setLoading(false);
    delete window[cb];
    const s = document.getElementById('jsonp-login');
    if (s) s.remove();

    if (!res || !res.success) {
      showMsg('✗ ' + (res ? res.message : 'Error desconocido'), 'error');
      return;
    }

    // ── Validación crítica: columna C (Role) debe ser "United" ──
    const role = String(res.role || '').trim().toLowerCase();
    if (role !== 'united') {
      showMsg('⛔ Acceso denegado — este portal es exclusivo para personal con rol "United". Tu rol actual no tiene autorización.', 'denied');
      return;
    }

    showMsg('✓ ' + res.message, 'success');
    const userData = { username: res.username, role: res.role, loginTime: new Date().toISOString(), portal: 'united' };
    sessionStorage.setItem('uaUser', JSON.stringify(userData));
    setTimeout(() => showWelcome(res.username, res.role), 400);
  };

  const scr = document.createElement('script');
  scr.id = 'jsonp-login';
  scr.src = url;
  scr.onerror = () => { setLoading(false); showMsg('✗ Error de conexión', 'error'); delete window[cb]; };
  document.body.appendChild(scr);

  setTimeout(() => {
    if (window[cb]) {
      delete window[cb];
      setLoading(false);
      showMsg('✗ Tiempo de espera agotado', 'error');
    }
  }, 15000);
}

function showWelcome(username, role) {
  document.getElementById('welcomeUser').textContent = username;
  document.getElementById('welcomeRole').textContent = role.toUpperCase();
  document.getElementById('welcome-screen').classList.add('show');
  setTimeout(() => { window.location.href = 'index.html'; }, 2000);
}

function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  const txt = document.getElementById('btnText');
  btn.disabled = on;
  txt.innerHTML = on ? '<span class="loading-spinner"></span>Autenticando...' : 'Iniciar Sesión';
}

function showMsg(text, type) {
  const m = document.getElementById('message');
  m.textContent = text;
  m.className = 'message ' + type;
  m.style.display = text ? 'block' : 'none';
}
</script>
</body>
</html>
